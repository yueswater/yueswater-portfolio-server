name: Deploy to Cloud Run

on:
    push:
        branches: [main]

permissions:
    contents: read
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: projects/632859162417/locations/global/workloadIdentityPools/github-pool/providers/github-provider
                  service_account: github-deploy@yueswater-portfolio.iam.gserviceaccount.com

            - uses: google-github-actions/setup-gcloud@v2

            - name: Create env.yaml
              run: echo "$ENV_YAML" > env.yaml
              env:
                  ENV_YAML: ${{ secrets.ENV_YAML }}

            - name: Deploy to Cloud Run
              run: |
                  gcloud run deploy yueswater-portfolio-server \
                    --source . \
                    --region asia-east1 \
                    --allow-unauthenticated \
                    --port 8080 \
                    --env-vars-file env.yaml \
                    --memory 512Mi \
                    --timeout 300 \
                    --min-instances 0 \
                    --max-instances 3 \
                    --project=yueswater-portfolio

            - name: Send failure email
              if: failure()
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: smtp.gmail.com
                  server_port: 587
                  username: ${{ secrets.SMTP_USER }}
                  password: ${{ secrets.SMTP_PASSWORD }}
                  subject: "Yueswater Portfolio Backend deploy failed - ${{ github.sha }}"
                  to: sungpinyue@gmail.com
                  from: ${{ secrets.SMTP_USER }}
                  body: |
                      Deploy failed!

                      Repo: ${{ github.repository }}
                      Branch: ${{ github.ref_name }}
                      Commit: ${{ github.sha }}
                      Author: ${{ github.actor }}
                      Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
